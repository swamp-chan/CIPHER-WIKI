<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CIPHER WIKI</title>
    <link href="style.css" rel="stylesheet">
  </head>
  <body>
    <nav>
      <div id="logo">
        <a href="inex.html" id="icon_btn"><span class="title">CIPHER</span>WIKI</a>
      </div>
      <div id="nav_subgroup">
        <div id="nav_links">
          <a href="index.html"class="primary_btn_nav">HOME</a> 
          <a href="about.html"class="primary_btn_nav">ABOUT</a>
          <a href="intro.html"class="primary_btn_nav">INTRODUCTION</a>
          <a href="tools.html"class="primary_btn_nav">TOOLS</a>
          <a href="refer.html"class="primary_btn_nav">REFERENCE</a>
        </div>

        <div id="login">
          <a href="#"class="primary_btn_nav"id="login_btn">LOGIN</a>
        </div> 
      </div>
    </nav>
    <main class="main_page">
      <a href="tools.html">
        <p id="back_to_tools_"><i class="bi bi-arrow-90deg-left"></i>BACK TO TOOLS</p>
      </a>

      <h1>
        TEXT ENCRYPTER
        <hr style="margin-bottom:60px;background-color:cyan">
      </h1>
      <div id="en_container">
        <div class="cols">
          <label>PLAIN TEXT</label>
          <textarea id="plain_text" placeholder="Type here..."></textarea>
        </div>
        <div id="en_controls">
          <button id="encryt">ENCRYPT</button>
          <button id="decrypt">DECRYPT</button>
          <hr style="width:100%;">
          <select id="cipher_type">
            <option value="caesar">Caesar Cipher</option>
            <option value="vigenere">Vigenere Cipher</option>
            <option value="base64">Base64</option>
          </select>
          <input type="number" id="keys" value="3">
          <button id="exec">EXECUTE</button>
        </div>
        <div class="column">
          <label>OUTPUT TEXT</label>
          <div id="cipher_text"></div>
        </div>
      </div>
    </main>
  </body>
</html>
